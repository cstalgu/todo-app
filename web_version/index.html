<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할 일 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 상단 헤더 -->
  <header class="topbar">
    <h1>오늘의 <span>할 일</span></h1>
    <span id="today-date"></span>
  </header>

  <div class="layout">

    <!-- 사이드바 -->
    <aside class="sidebar">

      <div>
        <p class="sidebar-section-title">전체 진행률</p>
        <div class="progress-card">
          <div class="progress-overall">
            <span class="progress-pct" id="progress-pct">0%</span>
            <span class="progress-summary" id="progress-summary">0개 중<br>0개 완료</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="전체 진행률"></div>
          </div>

          <div class="category-stats">
            <div class="stat-row">
              <div class="stat-row-header">
                <span class="stat-label"><span class="stat-dot stat-dot-work"></span>업무</span>
                <span class="stat-count stat-count-work" id="stat-work-nums">0 / 0</span>
              </div>
              <div class="stat-bar-wrap">
                <div class="stat-bar stat-bar-work" id="stat-work-bar"></div>
              </div>
            </div>
            <div class="stat-row">
              <div class="stat-row-header">
                <span class="stat-label"><span class="stat-dot stat-dot-personal"></span>개인</span>
                <span class="stat-count stat-count-personal" id="stat-personal-nums">0 / 0</span>
              </div>
              <div class="stat-bar-wrap">
                <div class="stat-bar stat-bar-personal" id="stat-personal-bar"></div>
              </div>
            </div>
            <div class="stat-row">
              <div class="stat-row-header">
                <span class="stat-label"><span class="stat-dot stat-dot-study"></span>공부</span>
                <span class="stat-count stat-count-study" id="stat-study-nums">0 / 0</span>
              </div>
              <div class="stat-bar-wrap">
                <div class="stat-bar stat-bar-study" id="stat-study-bar"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="main">
      <div class="main-inner">

        <!-- 입력 카드 -->
        <div class="input-card">
          <div class="input-row">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요" />
            <select id="category-select">
              <option value="work">업무</option>
              <option value="personal">개인</option>
              <option value="study">공부</option>
            </select>
            <select id="priority-select">
              <option value="중요">🔴 중요</option>
              <option value="보통" selected>🟡 보통</option>
              <option value="낮음">⚪ 낮음</option>
            </select>
            <button id="add-btn">추가</button>
          </div>
          <p id="input-error" role="alert" aria-live="assertive"></p>
          <p id="auto-hint" aria-live="polite"></p>
        </div>

        <!-- 검색 섹션 -->
        <div class="search-section">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="할 일 검색...">
          <button id="search-clear" style="display:none">✕</button>
        </div>

        <!-- 필터 탭 -->
        <nav class="filter-tabs">
          <span class="filter-tabs-label">보기:</span>
          <button data-filter="all">전체</button>
          <button data-filter="work">업무</button>
          <button data-filter="personal">개인</button>
          <button data-filter="study">공부</button>
          <button id="clear-all-btn" class="clear-all-btn">🗑 전체 삭제</button>
        </nav>

        <!-- 할 일 목록 -->
        <div id="todo-list"></div>

      </div>
    </main>

  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-message">
      <p id="modal-message" class="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="modal-cancel-btn">취소</button>
        <button id="modal-confirm" class="modal-confirm-btn">삭제</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js"></script>
</body>
</html>
